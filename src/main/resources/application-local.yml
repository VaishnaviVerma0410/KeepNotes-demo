# application-local.yml is a profile-specific configuration file.
# It's a config used only when the 'local' profile is active.
# This file is like giving the app instructions: which database to use,
# where to save data, and whether to show what it's doing.
# It's basically the settings file for the local development profile.

spring:
  datasource:
    url: jdbc:h2:file:./data/testdb          #jdbc:h2:file:./data/testdb. This is NOT in-memory. Data is saved to a file → survives restart. This directly fixes your “data disappears” problem
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update    #AUTOMATICALLY CREATES/UPDATES TABLES FROM @eNTITY CLASES. iT SAVES ME FROM WRITING sql MANUALLY
    show-sql: true      #PRINTS sql QUERIES IN CONSOLE. iT HELPS WITH DEBUGGING
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console        #TO BE ABLE TO OPEN HTTP:LOCALHOST:8080/h2-console